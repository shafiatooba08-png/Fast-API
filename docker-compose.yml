services:
  db:
    image: postgres:16
    container_name: real_estate_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: real_estate

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .

    container_name: real_estate_api

    depends_on:
      - db

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/real_estate
      SECRET_KEY: change_this_secret
      WEBHOOK_SECRET: change_this_webhook_secret

    restart: always


volumes:
  postgres_data: